services:
  - type: web
    name: truthlens-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    buildCommand: |
      pip install -r requirements.txt
    startCommand: "venv\\Scripts\\python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthCheckPath: /health
    envVars: {}
